# Quarkus OIDC (Keycloak 26)
quarkus.oidc.auth-server-url=http://localhost:8181/realms/proquip
quarkus.oidc.client-id=proquip-api
quarkus.oidc.credentials.secret=proquip-api-secret-dev
quarkus.oidc.tls.verification=none

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4201
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type
quarkus.http.cors.exposed-headers=Location

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/proquip_migrated
quarkus.datasource.username=proquip
quarkus.datasource.password=proquip
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true

# HTTP
quarkus.http.port=8080
