<div class="page-header">
  <h1>カテゴリ管理</h1>
  <p class="page-description">製品カテゴリの階層管理</p>
</div>

<div class="loading-spinner" *ngIf="isLoading">
  <div class="spinner"></div>
</div>

<div class="category-container" *ngIf="!isLoading">
  <div class="success-banner" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="category-layout">
    <div class="tree-panel">
      <div class="panel-header">
        <h3 class="panel-title">カテゴリ一覧</h3>
        <button class="btn-add" (click)="startCreate(null)">+ 新規カテゴリ</button>
      </div>

      <div class="tree-list" *ngIf="flattenedTree.length > 0">
        <div
          class="tree-item"
          *ngFor="let node of flattenedTree"
          [ngStyle]="getIndentStyle(node.level)"
          [class.editing]="editingCategoryId === node.category.id"
        >
          <button class="btn-toggle" (click)="toggleExpand(node)" *ngIf="node.children.length > 0">
            {{ node.expanded ? '▼' : '▶' }}
          </button>
          <span class="toggle-spacer" *ngIf="node.children.length === 0"></span>

          <div class="tree-item-info">
            <span class="category-name">{{ node.category.name }}</span>
            <span class="product-count">{{ node.category.productCount }} 製品</span>
          </div>

          <div class="tree-item-actions">
            <button class="btn-icon" title="上へ移動" (click)="moveUp(node)">↑</button>
            <button class="btn-icon" title="下へ移動" (click)="moveDown(node)">↓</button>
            <button
              class="btn-icon"
              title="子カテゴリを追加"
              (click)="startCreate(node.category.id)"
            >
              +
            </button>
            <button class="btn-icon" title="編集" (click)="startEdit(node.category)">
              &#9998;
            </button>
            <button
              class="btn-icon btn-icon-danger"
              title="削除"
              (click)="confirmDelete(node.category)"
            >
              &#10005;
            </button>
          </div>
        </div>
      </div>

      <div class="empty-state" *ngIf="flattenedTree.length === 0">カテゴリが登録されていません</div>
    </div>

    <div class="edit-panel" *ngIf="editMode">
      <h3 class="panel-title">
        {{ editMode === 'create' ? 'カテゴリ作成' : 'カテゴリ編集' }}
      </h3>

      <form [formGroup]="categoryForm" (ngSubmit)="saveCategory()" class="category-form">
        <div class="form-group">
          <label class="form-label">カテゴリ名 <span class="required">*</span></label>
          <input
            type="text"
            formControlName="name"
            class="form-input"
            placeholder="カテゴリ名を入力"
          />
          <span
            class="form-error"
            *ngIf="categoryForm.get('name')?.touched && categoryForm.get('name')?.errors"
          >
            カテゴリ名は必須です
          </span>
        </div>

        <div class="form-group">
          <label class="form-label">説明</label>
          <textarea
            formControlName="description"
            class="form-textarea"
            rows="3"
            placeholder="カテゴリの説明"
          ></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">親カテゴリ</label>
          <select formControlName="parentId" class="form-select">
            <option *ngFor="let opt of parentOptions" [ngValue]="opt.id">{{ opt.name }}</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="cancelEdit()">キャンセル</button>
          <button type="submit" class="btn-save" [disabled]="isSubmitting">
            {{ isSubmitting ? '保存中...' : '保存' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="confirm-dialog-overlay" *ngIf="showDeleteConfirm" (click)="cancelDelete()">
  <div class="confirm-dialog" (click)="$event.stopPropagation()">
    <h3 class="dialog-title">カテゴリの削除</h3>
    <div class="dialog-body">
      <p>「{{ deletingCategory?.name }}」を削除してもよろしいですか？</p>
    </div>
    <div class="dialog-footer">
      <button class="btn-outline" (click)="cancelDelete()">キャンセル</button>
      <button class="btn-primary" (click)="deleteCategory()">削除する</button>
    </div>
  </div>
</div>
