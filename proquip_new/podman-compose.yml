services:
  postgres:
    image: postgres:15.7-alpine
    container_name: proquip-new-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    networks:
      - proquip-new-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proquip -d proquip"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proquip-new-backend
    ports:
      - "8081:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/proquip
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../proquip_new/db/migration:/deployments/db/migration:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proquip-new-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proquip-new-frontend
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proquip-new-net

volumes:
  postgres-data:
    driver: local

networks:
  proquip-new-net:
    driver: bridge
