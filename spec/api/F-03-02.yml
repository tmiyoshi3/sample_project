openapi: "3.0.3"
info:
  title: "Existing System API - F-03-02 製品詳細画面"
  version: "1.0.0"
  description: "既存システムのAPI仕様（マイグレーション用） - F-03-02 製品詳細画面"

servers:
  - url: http://localhost:4200
    description: "既存システム（nginx経由）"

paths:
  /api/products/{id}:
    get:
      summary: "製品詳細取得"
      description: |
        製品IDを指定して製品の詳細情報を取得する。
        関連データ（仕様・画像・ドキュメント）をLEFT JOIN FETCHで一括取得する。

        取得データ:
        - 製品基本情報（name, sku, description, status, category, manufacturer）
        - 価格・数量情報（unitPrice, minOrderQty, weight）
        - 仕様情報（specifications: ProductSpecification → JSON文字列に変換）
        - 画像情報（images: ProductImage[] → ImageDto[]）
        - ドキュメント情報（documents: ProductDocument[] → DocumentDto[]）
        - 代替品ID（alternatives: Long[]）
        - タグ（tags: String[]）

        実装上の注意点:
        - specificationsはDB上ではProductSpecification別テーブル（specKey/specValue）だが、
          APIレスポンスではJSON文字列に変換して返却する。
        - createdAt/updatedAtはAPIレスポンスに含まれない（DTOマッピング漏れ）。
        - unit（単位名）はAPIレスポンスに含まれない（DTOマッピング漏れ）。
        - leadTimeDays（リードタイム）はAPIレスポンスに含まれない（DTOマッピング漏れ）。
        - width/height/depth（寸法）はAPIレスポンスに含まれない（DTOマッピング漏れ）。
        - suppliers/inventoryItemsはこのAPIには含まれない（別APIまたは未実装）。
        - stockQuantityとreorderPointはAPIレスポンスに含まれない。
      operationId: getProduct
      tags:
        - "F-03-02-001"
        - "F-03-02-005"
        - "F-03-02-006"
        - "F-03-02-007"
        - "F-03-02-008"
        - "F-03-02-009"
        - "F-03-02-010"
        - "F-03-02-011"
        - "F-03-02-013"
        - "F-03-02-014"
      x-feature-ids:
        - "F-03-02-001"
        - "F-03-02-005"
        - "F-03-02-006"
        - "F-03-02-007"
        - "F-03-02-008"
        - "F-03-02-009"
        - "F-03-02-010"
        - "F-03-02-011"
        - "F-03-02-013"
        - "F-03-02-014"
      x-evidence:
        network: "Network通信で確認: GET /api/products/1 [200], content-type: application/json, content-length: 923"
        source: "ソースコード: proquip-web/.../resource/ProductResource.java:179-254"
      x-confidence: "High"
      x-unconfirmed:
        - "createdAt/updatedAtがAPIレスポンスに含まれない原因（DTOマッピング漏れか意図的か）"
        - "unit/leadTimeDays/width/height/depthがAPIレスポンスに含まれない原因"
        - "在庫がある製品でのinventoryItemsの取得方法（メインAPIに含まれるか別APIか）"
        - "suppliersデータがメインAPIに含まれるか（現状product ID=1ではsuppliers未返却）"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "製品ID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "Network通信 + ソースコード: ProductResource.java:181 @PathParam(\"id\")"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailDto"
              example:
                id: 1
                skuCode: "DPC-001001"
                name: "Dell OptiPlex 7010 SFF"
                description: "Intel Core i5-13500T搭載 省スペース型デスクトップPC。メモリ16GB、SSD 512GB。法人向けスタンダードモデル。"
                categoryId: 7
                categoryName: "デスクトップPC"
                manufacturerId: 1
                manufacturerName: "Dell Technologies"
                unitPrice: 148000.00
                status: "ACTIVE"
                weight: 5.000
                minOrderQty: 1
                active: false
                specifications: '{"CPU":"Intel Core i5-13500T","メモリ":"16GB DDR5-4800","ストレージ":"512GB NVMe SSD","消費電力":"65 W"}'
                images:
                  - id: 1
                    fileName: "/images/products/product-1-dell-optiplex-7010.png"
                    mimeType: "PHOTO"
                    primary: true
                    sortOrder: 1
                documents:
                  - id: 1
                    docType: "DATASHEET"
                    fileName: "Dell OptiPlex 7010 SFF 仕様書"
                    filePath: "/documents/products/dell-optiplex-7010-sff-spec.pdf"
                    docVersion: "2024.1"
                alternatives: []
                tags: []
          x-evidence: "Network通信: GET /api/products/1 → 200, レスポンスボディ全フィールド確認済み"
        "404":
          description: "製品が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "商品が見つかりません。ID=999"
          x-evidence: "ソースコード: ProductResource.java:194-196 Response.Status.NOT_FOUND"

    delete:
      summary: "製品削除（論理削除）"
      description: |
        製品のステータスをDISCONTINUEDに変更する（論理削除）。物理削除ではない。

        処理フロー:
        1. ProductServiceBean.changeStatus(id, "DISCONTINUED")を呼び出し
        2. ステータス遷移バリデーション
        3. ProductChangeLogにステータス変更履歴を記録
        4. 監査ログに記録
        5. 204 No Content を返却

        ステータス遷移ルール:
        - DISCONTINUEDのまま再度DISCONTINUED変更はできない（ValidationException）
        - ACTIVEへの変更はPENDINGまたはINACTIVEからのみ可能

        フロントエンド側の処理:
        1. 削除ボタンクリック → 確認ダイアログ表示
        2. 「削除する」ボタンクリック → DELETE API呼び出し
        3. 成功時 → /products へ自動遷移
        4. 失敗時 → エラーメッセージ「製品の削除に失敗しました。」表示
      operationId: deleteProduct
      tags:
        - "F-03-02-004"
      x-feature-ids:
        - "F-03-02-004"
      x-evidence:
        network: "Network通信では未確認（実際の削除操作は実行せず）"
        source: "ソースコード: proquip-web/.../resource/ProductResource.java:334-341, proquip-ejb/.../service/ProductServiceBean.java:421-466"
      x-confidence: "High"
      x-unconfirmed:
        - "在庫がある製品の削除時の挙動（制約チェックの有無）"
        - "既にDISCONTINUEDの製品を再度削除した場合のエラーレスポンス形式"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "製品ID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "ソースコード: ProductResource.java:336 @PathParam(\"id\")"
      responses:
        "204":
          description: "削除成功（論理削除: ステータスをDISCONTINUEDに変更）"
          x-evidence: "ソースコード: ProductResource.java:341 Response.Status.NO_CONTENT"
        "404":
          description: "製品が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          x-evidence: "ソースコード: ProductServiceBean.java:423 EntityNotFoundException"
        "422":
          description: "バリデーションエラー（既にDISCONTINUEDの製品を削除しようとした場合等）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          x-evidence: "ソースコード: ProductServiceBean.java:427-428 ValidationException"

  /api/products/{id}/change-log:
    get:
      summary: "製品変更履歴取得"
      description: |
        製品の変更履歴をcreatedAt降順で取得する。

        レスポンスフィールド:
        - id: 変更ログID
        - changeType: 変更種別（"CREATE", "UPDATE", "STATUS_CHANGE"）
        - field: 変更対象フィールド名（"unit_price", "status"等。CREATE時はnull）
        - oldValue: 旧値（CREATE時はnull）
        - newValue: 新値（CREATE時はnull）
        - changedAt: 変更日時（ProductChangeLog.createdAtを使用）
        - changedBy: 変更者名（UserProfile.displayNameを解決。見つからない場合はchangedByUserIdの文字列）

        取得クエリ:
        SELECT cl FROM ProductChangeLog cl WHERE cl.product.id = :productId ORDER BY cl.createdAt DESC
      operationId: getProductChangeLog
      tags:
        - "F-03-02-015"
      x-feature-ids:
        - "F-03-02-015"
      x-evidence:
        network: "Network通信で確認: GET /api/products/1/change-log [200], content-type: application/json, content-length: 291"
        source: "ソースコード: proquip-web/.../resource/ProductResource.java:615-654"
      x-confidence: "High"
      x-unconfirmed:
        - "変更履歴が多数ある場合のページング有無（現状はページングなし・全件取得）"
        - "changeType=DELETEの場合の表示形式"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "製品ID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "Network通信 + ソースコード: ProductResource.java:617 @PathParam(\"id\")"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangeLogEntry"
              example:
                - id: 8
                  changeType: "UPDATE"
                  field: "unit_price"
                  oldValue: "145000"
                  newValue: "148000"
                  changedAt: "2024-10-01T10:00:00"
                  changedBy: "高橋優希"
                - id: 1
                  changeType: "CREATE"
                  field: null
                  oldValue: null
                  newValue: null
                  changedAt: "2024-04-01T10:00:00"
                  changedBy: "高橋優希"
          x-evidence: "Network通信: GET /api/products/1/change-log → 200, 2件のエントリ確認済み"
        "404":
          description: "製品が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          x-evidence: "ソースコード: ProductResource.java:624-625 Response.Status.NOT_FOUND"

  /api/products/{id}/suppliers:
    get:
      summary: "製品別サプライヤー一覧取得"
      description: |
        製品IDを指定して、その製品を取り扱うサプライヤー一覧をrating降順で取得する。

        取得クエリ:
        SELECT sp FROM SupplierProduct sp LEFT JOIN FETCH sp.supplier
        WHERE sp.product.id = :productId ORDER BY sp.supplier.rating DESC

        実装上の注意点:
        - EntityManagerを直接使用（サービス層を経由しない: 技術的負債）
        - 製品が存在しない場合も404は返さず、空配列を返す
        - フロントエンド（product-detail.component.ts）からは現状このAPIを直接呼び出していない。
          製品詳細のサプライヤータブはproduct.suppliersを参照しているが、
          GET /api/products/{id}のレスポンスにsuppliersフィールドが含まれない場合がある。
      operationId: getProductSuppliers
      tags:
        - "F-03-02-013"
      x-feature-ids:
        - "F-03-02-013"
      x-evidence:
        network: "Network通信では未確認（フロントエンドから呼び出されていない）"
        source: "ソースコード: proquip-web/.../resource/ProductResource.java:380-399"
      x-confidence: "Medium"
      x-unconfirmed:
        - "フロントエンドからの実際の呼び出し有無（FEはproduct.suppliersを参照しているがAPIレスポンスに含まれていない可能性）"
        - "サプライヤーが登録されている製品でのレスポンス確認（product ID=1はサプライヤー未登録）"
        - "SupplierDTOのフィールド一覧の完全な確認"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "製品ID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "ソースコード: ProductResource.java:383 @PathParam(\"id\")"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierDto"
          x-evidence: "ソースコード: ProductResource.java:398 supplierMapper.toDto()"

  /api/products/{id}/alternatives:
    get:
      summary: "製品代替品一覧取得"
      description: |
        製品IDを指定して代替品の一覧を取得する。

        処理フロー:
        1. productService.findById(id)で対象製品を取得
        2. ProductMapper.toDetailDto()で変換
        3. detailDto.getAlternatives()から代替品IDリストを取得
        4. 各IDについてproductService.findById()で製品取得 → ProductDTOに変換
        5. 見つからない代替品はwarningログ出力して無視（技術的負債#7）

        実装上の注意点:
        - フロントエンド（product-detail.component.ts）からはこのAPIを呼び出していない。
          代わりにGET /api/products?page=0&size=5（一般製品リスト先頭5件）から自身を除外して
          代替品として表示している（技術的負債）。
        - N+1クエリパターン（各代替品IDごとにfindById呼び出し）
      operationId: getProductAlternatives
      tags:
        - "F-03-02-012"
      x-feature-ids:
        - "F-03-02-012"
      x-evidence:
        network: "Network通信では未確認（フロントエンドからはGET /api/products?page=0&size=5を使用）"
        source: "ソースコード: proquip-web/.../resource/ProductResource.java:349-372"
      x-confidence: "Medium"
      x-unconfirmed:
        - "ProductAlternativeエンティティのデータ件数（product ID=1ではalternatives=[]）"
        - "フロントエンドがこのAPIを使わず一般製品リストで代用している理由"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "製品ID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "ソースコード: ProductResource.java:351 @PathParam(\"id\")"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductDto"
          x-evidence: "ソースコード: ProductResource.java:370"

