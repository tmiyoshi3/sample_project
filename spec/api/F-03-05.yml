# 技術的負債一覧（F-03-05関連）
# 1. SKUバリデーションパターン不一致: FE create ^[A-Z0-9]{2,4}-\d{3,8}$, custom-validators ^[A-Za-z]{2,5}-[0-9]{4,8}$, BE [A-Za-z]{2,5}-[0-9]{4,8}$
# 2. バリデーションエラーが500で返る（本来400）: GlobalExceptionMapperがValidationExceptionを適切にハンドリングしていない
# 3. SKU重複エラーが500で返る（本来409）
# 4. 負の価格（unitPrice < 0）のBEバリデーションなし
# 5. @RolesAllowed未設定（全認証ユーザーが製品登録/編集/削除可能）
# 6. create/editコンポーネント間でコード約90%重複
# 7. ファイルアップロードのサイズ上限なし
# 8. unsaved changesガード（canDeactivate）未実装
# 9. ProductImageのカラム名が混乱（fileName→image_url列、filePath→thumbnail_url列）
