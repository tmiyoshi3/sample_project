            active:
              type: boolean
              description: "アクティブフラグ"
            minOrderQty:
              type: integer
              description: "最低発注数（minimumOrderQuantityのエイリアス）"
      x-evidence: "Network通信 + ソースコード: proquip-common/dto/ProductDetailDto.java"

    ImageDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fileName:
          type: string
          description: "画像URL/パス（例: /images/products/product-1-dell-optiplex-7010.png）"
        mimeType:
