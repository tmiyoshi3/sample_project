      x-evidence: "Network通信 + ソースコード: proquip-common/dto/ProductDTO.java"

    ProductDetailDto:
      type: object
      description: "製品詳細DTO（画像・ドキュメント・仕様含む）"
      allOf:
        - $ref: "#/components/schemas/ProductDTO"
        - type: object
