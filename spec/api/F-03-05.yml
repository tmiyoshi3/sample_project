components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Keycloak OIDC JWT token（client_id: proquip-web）"

  schemas:
    CategoryItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: "カテゴリコード（例: CAT-DESKTOP）"
        name:
          type: string
          description: "カテゴリ名（例: デスクトップPC）"
        description:
          type: string
          description: "カテゴリ説明"
        parentId:
          type: integer
          format: int64
          nullable: true
          description: "親カテゴリID（ルートカテゴリの場合null）"
        productCount:
          type: integer
          description: "このカテゴリに属する製品数"
      x-evidence: "Network通信 + ソースコード: ProductResource.java:425-458"

    ManufacturerItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: "メーカーコード（例: MFR-DELL）"
        name:
          type: string
          description: "メーカー名（例: Dell Technologies）"
        country:
          type: string
          description: "国コード（例: USA, JPN, TWN）"
        website:
          type: string
          description: "Webサイト URL"
      x-evidence: "Network通信 + ソースコード: ProductResource.java:586-609"

    ProductCreateRequest:
      type: object
      required:
        - skuCode
        - name
      properties:
        skuCode:
          type: string
          maxLength: 50
          pattern: "[A-Za-z]{2,5}-[0-9]{4,8}"
          description: |
            SKU（品番）。ユニーク制約あり。
            技術的負債: FE create側パターン（^[A-Z0-9]{2,4}-\\d{3,8}$）と不一致。
          x-evidence: "Network通信 + ソースコード: ProductValidator.java:137-154"
        name:
          type: string
          maxLength: 300
          description: "製品名"
          x-evidence: "ソースコード: ProductValidator.java:69-75, Product.java: VARCHAR(300)"
        description:
          type: string
          maxLength: 10000
          description: "製品説明"
          x-evidence: "ソースコード: ProductValidator.java:117-119, Product.java: TEXT"
        categoryId:
          type: integer
          format: int64
          description: "カテゴリID（GET /api/products/categoriesで取得したidを指定）"
        manufacturerId:
          type: integer
          format: int64
          description: "メーカーID（GET /api/products/manufacturersで取得したidを指定）"
        unitPrice:
          type: number
          format: decimal
          description: |
            単価（税抜）。DB: NUMERIC(18,4)。
            技術的負債: BE側で負の値のバリデーションがない。
          x-evidence: "Network通信 + ソースコード: Product.java: precision=18, scale=4"
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - DISCONTINUED
            - PENDING
          description: |
            製品ステータス。
            新規登録FEでは ACTIVE/INACTIVE/ON_HOLD の3択。
            編集FEでは ACTIVE/INACTIVE/DISCONTINUED/ON_HOLD の4択。
            BE側デフォルト: DRAFT（FEから送信しない場合）。
          x-evidence: "ソースコード: ProductValidator.java:78-84"
        unit:
          type: string
          description: |
            単位名（unit_of_measure.nameの値）。
            例: "個", "台", "本", "箱", "セット", "ライセンス", "月", "年", "パック", "ロール"
            注意: unit_codeではなくnameを送信する。
          x-evidence: "Network通信で確認（unit: \"個\"で201 Created）+ DB: unit_of_measure.name"
        minimumOrderQuantity:
          type: integer
          minimum: 0
          description: "最低発注数"
          x-evidence: "ソースコード: ProductValidator.java:93-100"
        leadTimeDays:
          type: integer
          description: "リードタイム（日）"
          x-evidence: "ソースコード: Product.java: lead_time_days INT"
        weight:
          type: number
          format: decimal
          description: "重量（kg）。DB: DECIMAL(10,3)"
          x-evidence: "ソースコード: Product.java: weight_kg, precision=10, scale=3"
        dimensions:
          type: string
          description: "寸法（自由入力テキスト、例: 100mm x 50mm x 30mm）"
        specifications:
          type: string
          description: |
            仕様データ（JSON文字列）。キーバリューペアのオブジェクト。
            例: {"CPU": "Intel i5", "メモリ": "16GB"}
            BE側ではProductSpecificationエンティティに変換して保存される。
          x-evidence: "Network通信 + ソースコード: ProductResource.java:263-282"
        notes:
          type: string
          description: "備考"
          x-evidence: "ソースコード: Product.java: notes TEXT"
        tags:
          type: array
          items:
            type: string
          description: "タグ名の配列"

    ProductDTO:
      type: object
      description: "製品データ転送オブジェクト（作成・更新レスポンス用）"
      properties:
        id:
          type: integer
          format: int64
        skuCode:
          type: string
          description: "SKU（品番）"
        sku:
          type: string
          description: "SKU（skuCodeのエイリアス、同じ値）"
        name:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
          description: "非正規化カテゴリ名"
        manufacturerId:
          type: integer
          format: int64
        manufacturerName:
          type: string
          description: "非正規化メーカー名"
        unitPrice:
