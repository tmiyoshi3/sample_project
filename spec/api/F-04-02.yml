      summary: "サプライヤー評価履歴取得"
      description: |
        指定サプライヤーの評価履歴を取得する。
        NamedQuery「SupplierRating.findBySupplier」で取得。
        エンティティを直接返す（DTO未使用）。
        createdAt, updatedAt, versionなどの内部フィールドも含まれる。
      operationId: getSupplierRatings
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-009"
      x-evidence:
        network: "Network通信で確認: GET /api/suppliers/1/ratings [200] → 4件"
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:354-361, SupplierServiceBean.java:330-338"
      x-confidence: "High"
      x-tech-debt:
        - "エンティティを直接返している（DTO未使用、内部フィールド漏洩）"
        - "ratedByがユーザーID番号のみ（ユーザー名に解決されない）"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierRating"
              example:
                - id: 4
                  ratingDate: "2025-01-10"
                  qualityScore: 4.5
                  deliveryScore: 4.5
                  priceScore: 4.0
                  serviceScore: 4.8
                  overallScore: 4.5
                  ratedBy: 3
                  comments: "年末の大量発注にも柔軟に対応。"
                  ratingPeriod: "2024Q4"
                  createdAt: "2026-05-21T11:10:16"
                  updatedAt: "2026-05-21T11:10:16"
                  version: 0
          x-evidence: "Network通信: GET /api/suppliers/1/ratings レスポンス確認"

  /api/suppliers/{id}/rate:
    post:
      summary: "サプライヤー評価追加"
      description: |
        サプライヤーに新規評価を追加する。
        overallScoreは4カテゴリ（quality/delivery/price/service）の平均で自動計算。
        ratingPeriodは現在の四半期（例: 2026Q2）が自動設定される。
        SecurityContextからユーザーを特定してratedByに設定。
        評価追加後、サプライヤーの全体ratingが再計算される。

        スコア値の範囲: 0.00〜5.00（BigDecimal, precision 3, scale 1）
      operationId: rateSupplier
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-009"
      x-evidence:
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:518-541, SupplierServiceBean.java:340-380"
      x-confidence: "High"
      x-tech-debt:
        - "リクエストがMap<String, Object>（型安全なDTOなし）"
        - "resolveUserId()がSecurityContext解決失敗時にデフォルトID=1を返す（セキュリティリスク）"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qualityScore
                - deliveryScore
                - priceScore
              properties:
                qualityScore:
                  type: number
                  format: double
                  minimum: 0.0
                  maximum: 5.0
                  description: "品質スコア"
                deliveryScore:
                  type: number
                  format: double
                  minimum: 0.0
                  maximum: 5.0
                  description: "納期スコア"
                priceScore:
                  type: number
                  format: double
                  minimum: 0.0
                  maximum: 5.0
                  description: "価格スコア"
                serviceScore:
                  type: number
                  format: double
                  minimum: 0.0
                  maximum: 5.0
                  default: 3.0
                  description: "対応スコア（省略時3.0）"
                comments:
                  type: string
                  maxLength: 2000
                  description: "コメント"
            x-evidence: "ソースコード: SupplierResource.java:525-532, SupplierServiceBean.java:345-365"
      responses:
        "201":
          description: "評価追加成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierRating"
          x-evidence: "ソースコード: SupplierResource.java:540"

  /api/suppliers/{id}/certifications:
    get:
