components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Keycloak OIDC Bearer Token（現在は認証チェックのみ、認可チェックなし）"

  schemas:
    SupplierDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: "サプライヤーコード（例: SUP-001）"
        name:
          type: string
          description: "会社名"
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, PENDING_APPROVAL]
          description: "サプライヤーステータス"
        rating:
          type: number
          format: double
          description: "評価スコア（0.0-5.0）。現在は常に0を返す（技術的負債）"
        email:
          type: string
          description: "メールアドレス（primary contactから取得。現在は常に空文字）"
        phone:
          type: string
          description: "電話番号（primary contactから取得。現在は常に空文字）"

    SupplierContact:
      type: object
      properties:
        id:
          type: integer
          format: int64
        supplierId:
          type: integer
          format: int64
        name:
          type: string
          description: "担当者名（lastName + firstName）"
        department:
          type: string
          description: "部署名"
        position:
          type: string
          description: "役職（空文字の場合あり）"
        phone:
          type: string
          description: "電話番号"
        email:
          type: string
          description: "メールアドレス"
        isPrimary:
          type: boolean
          description: "主担当フラグ"

    SupplierProduct:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: "SupplierProduct ID"
        supplierSku:
          type: string
          description: "サプライヤー側のSKUコード"
        unitCost:
          type: number
          format: double
          description: "仕入単価"
        leadTimeDays:
          type: integer
          description: "リードタイム（日数）"
        minOrderQty:
          type: integer
          description: "最小注文数量"
        isPreferred:
          type: boolean
          description: "優先サプライヤーフラグ"
        productId:
          type: integer
          format: int64
          description: "製品ID"
        productName:
          type: string
          description: "製品名"
        productSku:
          type: string
          description: "製品SKUコード"

    SupplierContract:
      type: object
      properties:
        id:
          type: integer
          format: int64
        contractNumber:
          type: string
          description: "契約番号（unique）"
        title:
          type: string
          description: "契約名"
        startDate:
          type: string
          format: date
          description: "開始日"
        endDate:
          type: string
          format: date
          description: "終了日"
        status:
          type: string
          enum: [DRAFT, ACTIVE, EXPIRED, TERMINATED]
          description: "契約ステータス"
        terms:
          type: string
          description: "契約条件（TEXT型。レスポンスに含まれない場合あり）"
        createdAt:
          type: string
          format: date-time
          description: "作成日時（エンティティ直接返却のため含まれる）"
        updatedAt:
          type: string
          format: date-time
          description: "更新日時"
        version:
          type: integer
          description: "楽観的ロックバージョン"

    SupplierRating:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ratingDate:
          type: string
          format: date
          description: "評価日"
        qualityScore:
          type: number
          format: double
          description: "品質スコア（0.0-5.0）"
        deliveryScore:
          type: number
          format: double
          description: "納期スコア（0.0-5.0）"
        priceScore:
          type: number
          format: double
          description: "価格スコア（0.0-5.0）"
        serviceScore:
          type: number
          format: double
          description: "対応スコア（0.0-5.0）"
        overallScore:
          type: number
          format: double
          description: "総合スコア（4カテゴリの平均、自動計算）"
        ratedBy:
          type: integer
          format: int64
          description: "評価者ユーザーID"
        comments:
          type: string
          maxLength: 2000
          description: "コメント"
        ratingPeriod:
          type: string
          description: "評価期間（例: 2024Q4）"
        createdAt:
          type: string
          format: date-time
          description: "作成日時"
        updatedAt:
          type: string
          format: date-time
          description: "更新日時"
        version:
          type: integer
          description: "楽観的ロックバージョン"

    SupplierCertification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        certType:
          type: string
          description: "認証種別（例: ISO 9001:2015, プライバシーマーク）"
        certNumber:
          type: string
          description: "認証番号"
        issuedDate:
          type: string
          format: date
          description: "発行日"
        expiryDate:
          type: string
          format: date
          description: "有効期限"
        status:
          type: string
          enum: [VALID, EXPIRED, EXPIRING_SOON, REVOKED]
          description: "認証ステータス"
