            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contractNumber:
                  type: string
                title:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [DRAFT, ACTIVE, EXPIRED, TERMINATED]
                terms:
                  type: string
            x-evidence: "ソースコード: SupplierResource.java:293-303"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierContract"
          x-evidence: "ソースコード: SupplierResource.java:304"
        "404":
