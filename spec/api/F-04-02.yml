      responses:
        "204":
          description: "削除成功（No Content）"
          x-evidence: "ソースコード: SupplierResource.java:318"
        "404":
          description: "契約が存在しない、またはサプライヤー不一致"
          x-evidence: "ソースコード: SupplierResource.java:313-315"

  /api/suppliers/{id}/ratings:
