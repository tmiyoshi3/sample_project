openapi: "3.0.3"
info:
  title: "Existing System API - F-04-02 サプライヤー詳細画面"
  version: "1.0.0"
  description: "既存システムのAPI仕様（マイグレーション用） - F-04-02 サプライヤー詳細画面"

servers:
  - url: http://localhost:4200
    description: "既存システム（nginx経由）"

paths:
  /api/suppliers/{id}:
    get:
      summary: "サプライヤー詳細取得"
      description: |
        指定IDのサプライヤー基本情報を取得する。

        実装上の注意点:
        - enrichDto()でprimary contactからemail/phoneを取得するが、
          現在LazyInitializationExceptionにより空文字が返る。
        - ratingフィールドは常に0を返す（SupplierMapper.toDtoがratingをignoreし、
          enrichDto()で再計算するが結果がDTOに反映されない）。
        - nameKana, address, website, paymentTerms, notesはDTOに含まれず、
          FE側では常に「-」表示になる。
        - 存在しないIDの場合、EntityNotFoundExceptionが500で返される（本来は404が適切）。
      operationId: getSupplier
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-001"
        - "F-04-02-005"
      x-evidence:
        network: "Network通信で確認: GET /api/suppliers/1 [200], GET /api/suppliers/12 [200]"
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:135-142"
      x-confidence: "High"
      x-tech-debt:
        - "ratingが常に0（SupplierMapper.toDtoがratingをignoreし、enrichDto()再計算結果がDTOに反映されない）"
        - "email/phoneが空文字（LazyInitializationExceptionでcontactsコレクション未ロード）"
        - "nameKana, address, website, paymentTerms, notesがDTOに含まれない"
        - "存在しないIDでEntityNotFoundExceptionが500で返される（404が適切）"
        - "@RolesAllowed未設定（全ユーザーアクセス可能）"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "Network通信 + ソースコード: SupplierResource.java:136"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDTO"
              example:
                id: 1
                code: "SUP-001"
                name: "大塚商会"
                status: "ACTIVE"
                rating: 0
                email: ""
                phone: ""
          x-evidence: "Network通信: GET /api/suppliers/1 レスポンス確認"
        "500":
          description: "サーバーエラー（存在しないIDの場合も500）"
          x-evidence: "Network通信: DELETE /api/suppliers/9999 → HTTP 500"
          x-unconfirmed:
            - "エラーレスポンスのボディ構造（HTMLエラーページが返される可能性）"

    delete:
      summary: "サプライヤー削除（論理削除）"
      description: |
        サプライヤーを論理削除する（ステータスをINACTIVEに変更）。
        物理削除ではなくdeactivateSupplier()による論理削除。
        SecurityContextからユーザー情報を取得して監査ログに記録する。
      operationId: deleteSupplier
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-004"
      x-evidence:
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:192-199, SupplierServiceBean.java:186-196"
      x-confidence: "High"
      x-tech-debt:
        - "@RolesAllowed未設定（全ユーザーが削除可能）"
        - "存在しないIDの場合500エラー（404が適切）"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
          x-evidence: "ソースコード: SupplierResource.java:193"
      responses:
        "204":
          description: "削除成功（No Content）"
          x-evidence: "ソースコード: SupplierResource.java:198"
        "500":
          description: "サーバーエラー（存在しないID等）"
          x-evidence: "Network通信: DELETE /api/suppliers/9999 → HTTP 500"

  /api/suppliers/{id}/contacts:
    get:
      summary: "サプライヤー連絡先一覧取得"
      description: |
        指定サプライヤーの連絡先情報を一覧取得する。
        NamedQuery「SupplierContact.findBySupplier」で取得。
        名前はlastName + firstNameで結合して返す。
      operationId: getSupplierContacts
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-006"
      x-evidence:
        network: "Network通信で確認: GET /api/suppliers/1/contacts [200] → 2件"
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:321-346"
      x-confidence: "High"
      x-tech-debt:
        - "DTOを使わずMap<String, Object>で返している（型安全性なし）"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierContact"
              example:
                - id: 1
                  supplierId: 1
                  name: "松本 健太"
                  department: "法人営業部"
                  position: ""
                  phone: "03-3522-1001"
                  email: "matsumoto.kenta@otsuka-shokai.example.com"
                  isPrimary: true
                - id: 2
                  supplierId: 1
                  name: "岡田 由美"
                  department: "管理部"
                  position: ""
                  phone: "03-3522-1002"
                  email: "okada.yumi@otsuka-shokai.example.com"
                  isPrimary: false
          x-evidence: "Network通信: GET /api/suppliers/1/contacts レスポンス確認"

  /api/suppliers/{id}/products:
    get:
      summary: "サプライヤー取扱製品一覧取得"
      description: |
        指定サプライヤーに紐づく取扱製品一覧を取得する。
        SupplierProduct エンティティをLEFT JOIN FETCHでProduct詳細と結合して返す。
      operationId: getSupplierProducts
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-007"
      x-evidence:
        network: "Network通信で確認: GET /api/suppliers/1/products [200] → 14件"
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:211-243"
      x-confidence: "High"
      x-tech-debt:
        - "DTOを使わずMap<String, Object>で返している"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierProduct"
              example:
                - id: 8
                  supplierSku: "OTS-MFCL3780"
                  unitCost: 54000.0
                  leadTimeDays: 5
                  minOrderQty: 1
                  isPreferred: false
                  productId: 29
                  productName: "Brother MFC-L3780CDW"
                  productSku: "PRT-007001"
          x-evidence: "Network通信: GET /api/suppliers/1/products レスポンス確認"

    post:
      summary: "サプライヤー取扱製品追加"
      description: |
        サプライヤーに取扱製品を紐付ける。
        productIdで製品を検索し、SupplierProductエンティティを作成する。
      operationId: addSupplierProduct
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-007"
      x-evidence:
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:458-494"
      x-confidence: "High"
      x-tech-debt:
        - "リクエストがMap<String, Object>（型安全なDTOなし）"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: integer
                  format: int64
                  description: "紐付ける製品のID"
                supplierSku:
                  type: string
                  description: "サプライヤー側のSKUコード"
                unitCost:
                  type: number
                  format: double
                  default: 0.0
                  description: "仕入単価"
                leadTimeDays:
                  type: integer
                  default: 0
                  description: "リードタイム（日数）"
                minOrderQty:
                  type: integer
                  default: 1
                  description: "最小注文数量"
                isPreferred:
                  type: boolean
                  description: "優先サプライヤーフラグ"
            x-evidence: "ソースコード: SupplierResource.java:465-480"
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"
          x-evidence: "ソースコード: SupplierResource.java:489-493"
        "400":
          description: "製品が見つからない場合"
          x-evidence: "ソースコード: SupplierResource.java:472-474"

  /api/suppliers/{id}/products/{spId}:
    delete:
      summary: "サプライヤー取扱製品紐付け削除"
      description: |
        サプライヤーと製品の紐付け（SupplierProduct）を削除する。
        所有権チェック（supplier.idの一致確認）を行う。
      operationId: removeSupplierProduct
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-007"
      x-evidence:
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:496-508"
      x-confidence: "High"
      x-tech-debt:
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
        - name: spId
          in: path
          description: "SupplierProduct ID"
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: "削除成功（No Content）"
          x-evidence: "ソースコード: SupplierResource.java:506"
        "404":
          description: "SupplierProductが存在しない、またはサプライヤー不一致"
          x-evidence: "ソースコード: SupplierResource.java:501-503"

  /api/suppliers/{id}/contracts:
    get:
      summary: "サプライヤー契約一覧取得"
      description: |
        指定サプライヤーの契約一覧をstartDate降順で取得する。
        エンティティを直接返す（DTO未使用）。
        createdAt, updatedAt, versionなどの内部フィールドも含まれる。
      operationId: getSupplierContracts
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-008"
      x-evidence:
        network: "Network通信で確認: GET /api/suppliers/1/contracts [200] → 1件"
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:251-263"
      x-confidence: "High"
      x-tech-debt:
        - "エンティティを直接返している（DTO未使用、内部フィールド漏洩）"
        - "termsフィールドがレスポンスに含まれない（FEで常に「-」表示）"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierContract"
              example:
                - id: 1
                  contractNumber: "CNT-2024-001"
                  title: "大塚商会 年間基本取引契約 2024"
                  startDate: "2024-04-01"
                  endDate: "2025-03-31"
                  status: "ACTIVE"
                  createdAt: "2026-05-21T11:10:16"
                  updatedAt: "2026-05-21T11:10:16"
                  version: 0
          x-evidence: "Network通信: GET /api/suppliers/1/contracts レスポンス確認"

    post:
      summary: "サプライヤー契約作成"
      description: |
        新規契約を作成する。
        日付はyyyy-MM-dd形式でパース。titleを省略するとcontractNumberが使用される。
        statusを省略するとDRAFTがデフォルト。
      operationId: createContract
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-008"
      x-evidence:
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:265-283"
      x-confidence: "High"
      x-tech-debt:
        - "リクエストがMap<String, Object>（型安全なDTOなし）"
        - "バリデーションなし（contractNumber重複チェック等なし）"
        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contractNumber
                - startDate
                - endDate
              properties:
                contractNumber:
                  type: string
                  description: "契約番号（例: CNT-2024-001）"
                title:
                  type: string
                  description: "契約名（省略時はcontractNumberを使用）"
                startDate:
                  type: string
                  format: date
                  description: "開始日（yyyy-MM-dd）"
                endDate:
                  type: string
                  format: date
                  description: "終了日（yyyy-MM-dd）"
                status:
                  type: string
                  enum: [DRAFT, ACTIVE, EXPIRED, TERMINATED]
                  default: "DRAFT"
                  description: "契約ステータス"
                terms:
                  type: string
                  description: "契約条件"
            x-evidence: "ソースコード: SupplierResource.java:269-278"
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierContract"
          x-evidence: "ソースコード: SupplierResource.java:282"

  /api/suppliers/{id}/contracts/{contractId}:
    put:
