        - "@RolesAllowed未設定"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: "サプライヤーID"
          required: true
          schema:
            type: integer
            format: int64
        - name: contractId
          in: path
          description: "契約ID"
          required: true
