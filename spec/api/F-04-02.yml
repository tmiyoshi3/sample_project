          x-evidence: "ソースコード: SupplierResource.java:291-292"

    delete:
      summary: "サプライヤー契約削除"
      description: |
        契約を物理削除する。
        所有権チェック（supplier.idの一致確認）を行う。
      operationId: deleteContract
      tags:
        - "F-04-02"
      x-feature-ids:
        - "F-04-02-008"
      x-evidence:
        source: "ソースコード: proquip-web/.../resource/SupplierResource.java:307-319"
